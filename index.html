<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOVA | Accueil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-300">
  <nav class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl border-b border-gray-200 dark:border-gray-800 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex flex-wrap items-center justify-between gap-3">
      <a href="index.html" class="text-2xl font-bold tracking-tight bg-gradient-to-r from-gray-900 to-gray-600 bg-clip-text text-transparent dark:from-white dark:to-gray-300">NOVA</a>
      
      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center gap-6">
        <a href="index.html" class="hover:text-blue-600 dark:hover:text-blue-400 transition font-semibold text-blue-600 dark:text-blue-400">🏠 Accueil</a>
        <a href="shop.html" class="hover:text-blue-600 dark:hover:text-blue-400 transition">🛍️ Boutique</a>
        <a href="cart.html" class="hover:text-blue-600 dark:hover:text-blue-400 transition">🛒 Panier</a>
      </div>
      
      <!-- Search Bar -->
      <div class="flex-1 max-w-md hidden md:block"><input type="text" id="globalSearchInput" placeholder="Rechercher un produit..." class="w-full px-4 py-2 rounded-full border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:ring-2 focus:ring-blue-400 outline-none"></div>
      
      <!-- Right Actions -->
      <div class="flex items-center gap-4">
        <button id="customerLoginBtn" class="hidden md:block p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
          👤
        </button>
        <button id="darkModeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">🌙</button>
        <a href="cart.html" class="relative p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
          🛒 <span id="cartCountBadge" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">0</span>
        </a>
        
        <!-- Mobile Menu Toggle -->
        <button id="mobileMenuToggle" class="md:hidden p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
          <span id="hamburgerIcon">☰</span>
        </button>
      </div>
    </div>
    
    <!-- Mobile Search -->
    <div class="md:hidden px-4 pb-3"><input type="text" id="mobileGlobalSearch" placeholder="Rechercher..." class="w-full px-4 py-2 rounded-full border border-gray-300 dark:border-gray-700 bg-gray-50"></div>
    
    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden md:hidden bg-white/90 dark:bg-gray-900/90 backdrop-blur-lg border-t border-gray-200 dark:border-gray-800">
      <div class="px-4 py-3 space-y-2">
        <a href="index.html" class="block px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition font-semibold text-blue-600 dark:text-blue-400">🏠 Accueil</a>
        <a href="shop.html" class="block px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition">🛍️ Boutique</a>
        <a href="cart.html" class="block px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition">🛒 Panier</a>
        <button id="mobileCustomerLoginBtn" class="w-full text-left px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition">
          👤 Connexion
        </button>
      </div>
    </div>
  </nav>
  <main id="mainContent" class="fade-page"></main>
  <div id="toastContainer" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>
</body>
</html>
