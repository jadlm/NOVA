<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOVA | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-300">
  <nav class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl border-b border-gray-200 dark:border-gray-800 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex flex-wrap items-center justify-between gap-3">
      <a href="index.html" class="text-2xl font-bold tracking-tight bg-gradient-to-r from-gray-900 to-gray-600 bg-clip-text text-transparent dark:from-white dark:to-gray-300">NOVA Admin</a>
      <div class="hidden md:flex items-center gap-6">
        <a href="index.html" class="hover:text-blue-600 dark:hover:text-blue-400 transition">🏠 Accueil</a>
        <a href="shop.html" class="hover:text-blue-600 dark:hover:text-blue-400 transition">🛍️ Boutique</a>
        <a href="admin.html" class="hover:text-blue-600 dark:hover:text-blue-400 transition font-semibold text-blue-600 dark:text-blue-400">⚙️ Admin</a>
      </div>
      <div class="flex items-center gap-4">
        <button id="darkModeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">🌙</button>
        <a href="index.html" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">🚪 Sortir</a>
      </div>
    </div>
  </nav>
  <main id="adminContainer" class="max-w-7xl mx-auto px-4 py-8"></main>
  <div id="toastContainer" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>
  <script>if(window.loadAdmin) loadAdmin(); else window.addEventListener('DOMContentLoaded', () => loadAdmin());</script>
</body>
</html>
